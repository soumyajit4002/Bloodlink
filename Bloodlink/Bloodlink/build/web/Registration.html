<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration Page</title>
  <link rel="stylesheet" href="Style1.css" />
</head>
<body>
  <div class="registration-container">
    <h2>Register Now</h2>
    <form action="Registration" method="post">
      <div class="form-group">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="t1" placeholder="Enter your full name" required />
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="t2" placeholder="Enter your email" required />
      </div>
	  <div class="form-group">
        <label for="ph_number">Phone Number</label>
        <input type="number" id="number" name="t3" placeholder="Enter your mobile number" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="t4" placeholder="Enter password" required />
      </div>
      <div class="form-group">
        <label for="address">Address</label>
        <input type="text" id="address" name="t5" placeholder="Enter address" required />
      </div>
      <div class="form-group">
        <label for="gender">Gender</label>
        <select id="gender" name="gender" required>
        <option value="">--Select Gender--</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Rather not say">Rather not say</option>
        </select>
      </div>

      <button type="submit" class="submit-btn">Register</button>
      <div class="login-link">
        Already have an account? <a href="login.html">Login here</a>
      </div>
    </form>
  </div>
</body>
</html>
